<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RacerFlix</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/jogos.css">
</head>
<body>
    <video id="bgVideo" class="video-bg" autoplay muted loop playsinline preload="auto">
        <source src="../assets/vid/night.mp4" type="video/mp4">
        Seu navegador não suporta vídeo em background.
    </video>
    <!-- Tela de carregamento -->
    <div id="loader" class="loader-overlay">
        <video autoplay muted loop playsinline></video>
        <div class="netflix-spinner"></div>
    </div>
    <div id="fadeOverlay"></div>
    <div id="global-header"></div>

    <!-- HERO / BANNER -->
    <section class="hero">
        <video id="heroVideo" class="hero-video" muted playsinline poster="../assets/img/TW2.jpg">
            <source src="../assets/vid/tw2g.mp4" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>

        <div class="hero-content">
            <h1 class="hero-title">THE CREW 2</h1>

            <p class="hero-description">
                Uma jornada insana pelo mundo das corridas ilegais, supercarros e velocidade extrema.
            </p>

            <div class="hero-buttons">
                <button class="hero-btn play" id="playTrailerBtn">▶ Trailer</button>
                <button class="hero-btn info">ℹ Mais informações</button>
                
            </div>
        </div>

        <!-- Botão de controle à direita -->
        <div class="hero-controls-right">
            <button id="muteBtn" class="mute-btn" aria-label="Alternar som">
                <span id="muteIcon">🔇</span>
            </button>
        </div>
    </section>

    <!-- CONTEÚDO -->
    <main>
        <div class="tabs">
            <a href="jogos.html"><button class="tab-btn">Jogos</button></a>
        </div>
